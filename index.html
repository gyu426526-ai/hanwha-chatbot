<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한화생명 보험 상담 챗봇</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, 'Pretendard', 'Noto Sans KR', sans-serif;
  background: #f5f5f5;
  color: #222;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ── Chat Container ── */
.chat-wrap {
  width: 100%;
  max-width: 480px;
  height: 100vh;
  max-height: 100vh;
  display: flex;
  flex-direction: column;
  background: #fff;
  box-shadow: 0 0 24px rgba(0,0,0,.08);
}

/* ── Header ── */
.chat-header {
  background: linear-gradient(135deg, #FF6B00, #FF8C00);
  color: #fff;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.chat-header .logo {
  width: 42px; height: 42px;
  background: #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 13px; color: #FF6B00;
  flex-shrink: 0;
}
.chat-header .title-area h1 { font-size: 17px; font-weight: 700; }
.chat-header .title-area p { font-size: 12px; opacity: .85; margin-top: 2px; }

/* ── Mode Tabs ── */
.mode-tabs {
  display: flex;
  flex-shrink: 0;
  background: #fff;
  border-bottom: 1px solid #eee;
}
.mode-tab {
  flex: 1;
  padding: 12px 0;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: #fff;
  color: #999;
  position: relative;
  transition: color .2s;
}
.mode-tab:hover { color: #666; }
.mode-tab.active { color: #FF6B00; }
.mode-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 3px;
  background: #FF6B00;
  border-radius: 3px 3px 0 0;
}
.mode-tab .tab-icon { margin-right: 6px; }

/* internal mode header color */
.chat-wrap.internal .chat-header {
  background: linear-gradient(135deg, #1B365D, #2A5298);
}
.chat-wrap.internal .mode-tab.active { color: #1B365D; }
.chat-wrap.internal .mode-tab.active::after { background: #1B365D; }
.chat-wrap.internal .chat-header .logo { color: #1B365D; }
.chat-wrap.internal .msg.bot .avatar { background: #E8EDF5; color: #1B365D; }
.chat-wrap.internal .msg.user .bubble { background: #1B365D; }
.chat-wrap.internal .chat-input input:focus { border-color: #1B365D; }
.chat-wrap.internal .chat-input button { background: #1B365D; }
.chat-wrap.internal .chat-input button:hover { background: #142A4F; }
.chat-wrap.internal .quick-btn { border-color: #1B365D; color: #1B365D; }
.chat-wrap.internal .quick-btn:hover { background: #1B365D; color: #fff; }

/* ── Messages Area ── */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: #FAFAFA;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* ── Message Bubbles ── */
.msg { display: flex; gap: 8px; max-width: 88%; animation: fadeUp .25s ease; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg .avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0; margin-top: 2px;
}
.msg.bot .avatar { background: #FFF3E6; color: #FF6B00; }
.msg.user .avatar { background: #E8F0FE; color: #1A73E8; }

.bubble {
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.65;
  word-break: keep-all;
}
.msg.bot .bubble { background: #fff; border: 1px solid #eee; border-top-left-radius: 4px; }
.msg.user .bubble { background: #FF6B00; color: #fff; border-top-right-radius: 4px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Typing indicator ── */
.typing { display: flex; gap: 4px; padding: 8px 16px; }
.typing span {
  width: 7px; height: 7px; background: #ccc; border-radius: 50%;
  animation: bounce .6s infinite alternate;
}
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { to { transform: translateY(-6px); opacity: .5; } }

/* ── Quick Replies ── */
.quick-replies {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  animation: fadeUp .3s ease;
}
.quick-btn {
  padding: 12px 32px;
  border: 1.5px solid #FF6B00;
  border-radius: 24px;
  background: #fff;
  color: #FF6B00;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  min-width: 200px;
  text-align: center;
}
.quick-btn:hover { background: #FF6B00; color: #fff; }

/* ── Product Card ── */
.product-card {
  background: #fff;
  border: 1px solid #eee;
  border-radius: 14px;
  padding: 16px;
  margin-top: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
}
.product-card .card-badge {
  display: inline-block;
  background: #FFF3E6;
  color: #FF6B00;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 10px;
  margin-bottom: 8px;
}
.product-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.product-card p { font-size: 13px; color: #555; line-height: 1.6; }
.product-card .card-info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 10px;
  font-size: 12px;
}
.product-card .card-info dt { color: #999; }
.product-card .card-info dd { color: #333; font-weight: 600; }
.product-card .card-features {
  margin-top: 10px; padding: 0; list-style: none; font-size: 12px; color: #555;
}
.product-card .card-features li::before { content: "✓ "; color: #FF6B00; font-weight: 700; }
.product-card .card-features li { margin-bottom: 3px; }

/* ── Scenario Card ── */
.scenario-card {
  background: linear-gradient(135deg, #FFF8F0, #FFF);
  border: 1px solid #FFD9B3;
  border-radius: 14px;
  padding: 16px;
  margin-top: 8px;
}
.scenario-card h3 { font-size: 15px; font-weight: 700; color: #E65C00; margin-bottom: 4px; }
.scenario-card .persona { font-size: 13px; color: #666; margin-bottom: 10px; }
.scenario-card .rec-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #FFE8D0;
  font-size: 13px;
}
.scenario-card .rec-item:last-child { border-bottom: none; }
.scenario-card .rec-name { font-weight: 600; color: #333; }
.scenario-card .rec-price { color: #FF6B00; font-weight: 700; }
.scenario-card .rec-reason { font-size: 11px; color: #888; margin-top: 2px; }
.scenario-card .total {
  margin-top: 10px; padding-top: 10px; border-top: 2px solid #FF6B00;
  display: flex; justify-content: space-between;
  font-weight: 700; font-size: 14px; color: #FF6B00;
}
.scenario-card .summary {
  margin-top: 10px; font-size: 12px; color: #555; line-height: 1.6;
  background: #fff; padding: 10px 12px; border-radius: 8px;
}

/* ── Comparison Table ── */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 8px;
}
.compare-table th {
  background: #FF6B00;
  color: #fff;
  padding: 8px 6px;
  text-align: center;
  font-size: 11px;
}
.compare-table th:first-child { border-radius: 8px 0 0 0; }
.compare-table th:last-child { border-radius: 0 8px 0 0; }
.compare-table td {
  padding: 8px 6px;
  border-bottom: 1px solid #eee;
  text-align: center;
  color: #444;
}
.compare-table td:first-child { font-weight: 600; color: #333; text-align: left; }
.compare-table tr:last-child td:first-child { border-radius: 0 0 0 8px; }
.compare-table tr:last-child td:last-child { border-radius: 0 0 8px 0; }

/* ── Input Area ── */
.chat-input {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid #eee;
  background: #fff;
  flex-shrink: 0;
}
.chat-input input {
  flex: 1;
  border: 1.5px solid #ddd;
  border-radius: 24px;
  padding: 12px 18px;
  font-size: 14px;
  outline: none;
  transition: border .2s;
}
.chat-input input:focus { border-color: #FF6B00; }
.chat-input button {
  width: 46px; height: 46px;
  border: none;
  border-radius: 50%;
  background: #FF6B00;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  transition: background .15s;
  display: flex; align-items: center; justify-content: center;
}
.chat-input button:hover { background: #E65C00; }
.chat-input button:disabled { background: #ccc; cursor: default; }

/* ── Responsive ── */
@media (min-width: 481px) {
  .chat-wrap { border-radius: 20px; max-height: 92vh; margin: 20px; }
}
</style>
</head>
<body>
<script src="products.js"></script>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="logo">한화</div>
    <div class="title-area">
      <h1>한화생명 보험 상담</h1>
      <p>AI 챗봇이 맞춤 보험을 안내해 드려요</p>
    </div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="customer" onclick="switchMode('customer')">
      <span class="tab-icon">💬</span>고객 상담
    </button>
    <button class="mode-tab" data-mode="internal" onclick="switchMode('internal')">
      <span class="tab-icon">📋</span>사내 업무
    </button>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="궁금한 점을 물어보세요..." autocomplete="off">
    <button id="sendBtn" onclick="handleSend()">&#10148;</button>
  </div>
</div>

<script>
/* ================================================================
   한화생명 보험 상담 챗봇
   ================================================================ */

let DATA = null;
let currentMode = 'customer';
const $messages = document.getElementById('chatMessages');
const $input = document.getElementById('userInput');
const $sendBtn = document.getElementById('sendBtn');
const $chatWrap = document.querySelector('.chat-wrap');
const $headerTitle = document.querySelector('.chat-header .title-area h1');
const $headerDesc = document.querySelector('.chat-header .title-area p');
let chatHistory = [];

// ── Load Data ──
if (typeof PRODUCTS_DATA !== 'undefined') {
  DATA = PRODUCTS_DATA;
  startChat();
} else {
  addBot('데이터를 불러오지 못했습니다. products.js 파일을 확인해 주세요.');
}

// ── Enter key ──
$input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

// ── Mode Switch ──
function switchMode(mode) {
  if (mode === currentMode) return;
  currentMode = mode;
  chatHistory = [];
  $messages.innerHTML = '';

  // Update tabs
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.mode === mode);
  });

  // Update theme
  $chatWrap.classList.toggle('internal', mode === 'internal');

  // Update header
  if (mode === 'internal') {
    $headerTitle.textContent = '한화생명 사내 업무';
    $headerDesc.textContent = '상품 규정, 심사 기준, 업무 절차를 검색하세요';
    $input.placeholder = '사내 규정이나 업무 절차를 검색하세요...';
  } else {
    $headerTitle.textContent = '한화생명 보험 상담';
    $headerDesc.textContent = 'AI 챗봇이 맞춤 보험을 안내해 드려요';
    $input.placeholder = '궁금한 점을 물어보세요...';
  }

  startChat();
  $input.focus();
}

// ── Start ──
function startChat() {
  if (currentMode === 'internal') {
    addBot('<b>한화생명 사내 업무 어시스턴트</b>입니다.<br>상품 규정, 인수심사 기준, 청구 절차, 민원 처리 등을 검색할 수 있습니다.');
    setTimeout(() => {
      addQuickReplies([
        { text: '인수심사 기준', value: '인수심사 기본 기준을 알려줘' },
        { text: '보험금 청구 절차', value: '보험금 청구 지급 프로세스를 알려줘' },
        { text: '민원 처리 절차', value: '고객 민원 처리 절차를 알려줘' },
        { text: '상품 비교표', value: '전체 상품 비교표를 보여줘' },
      ]);
    }, 300);
  } else {
    addBot('안녕하세요! <b>한화생명 보험 상담 챗봇</b>입니다. 😊<br>보험 상품 안내, 맞춤 추천, 자주 묻는 질문 등 무엇이든 물어보세요!');
    setTimeout(() => {
      addQuickReplies([
        { text: '상품 전체 보기', value: '상품 전체 보기' },
        { text: '맞춤 추천 받기', value: '맞춤 추천 받기' },
        { text: '자주 묻는 질문', value: '자주 묻는 질문' },
        { text: '상품 비교하기', value: '상품 비교하기' },
      ]);
    }, 300);
  }
}

// ── Send ──
function handleSend() {
  const text = $input.value.trim();
  if (!text || !DATA) return;
  $input.value = '';
  addUser(text);
  processInput(text);
}

// ── Process ──
function processInput(text) {
  // Add user message to history
  chatHistory.push({ role: 'user', content: text });

  // Show typing indicator and call Claude API
  showTyping();
  $input.disabled = true;
  $sendBtn.disabled = true;

  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: chatHistory, mode: currentMode }),
  })
    .then(r => r.json())
    .then(data => {
      hideTyping();
      $input.disabled = false;
      $sendBtn.disabled = false;
      $input.focus();
      if (data.error) {
        addBot('죄송합니다. 오류가 발생했습니다: ' + escHtml(data.error));
      } else {
        chatHistory.push({ role: 'assistant', content: data.reply });
        addBot(data.reply);
      }
    })
    .catch(err => {
      hideTyping();
      $input.disabled = false;
      $sendBtn.disabled = false;
      $input.focus();
      addBot('서버 연결에 실패했습니다. server.py가 실행 중인지 확인해 주세요.');
    });
}


// ── DOM Helpers ──
function addUser(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="avatar">나</div><div class="bubble">${escHtml(text)}</div>`;
  $messages.appendChild(div);
  scrollBottom();
}

function addBot(html) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="avatar">🤖</div><div class="bubble">${html}</div>`;
  $messages.appendChild(div);
  scrollBottom();
}

function addQuickReplies(items) {
  const wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  for (const item of items) {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = item.text;
    btn.onclick = () => {
      document.querySelectorAll('.quick-replies').forEach(el => el.remove());
      addUser(item.text);
      processInput(item.value);
    };
    wrap.appendChild(btn);
  }
  $messages.appendChild(wrap);
  scrollBottom();
}

let typingEl = null;
function showTyping() {
  typingEl = document.createElement('div');
  typingEl.className = 'msg bot';
  typingEl.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  $messages.appendChild(typingEl);
  scrollBottom();
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

function scrollBottom() {
  requestAnimationFrame(() => { $messages.scrollTop = $messages.scrollHeight; });
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
